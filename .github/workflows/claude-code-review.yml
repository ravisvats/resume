name: Claude Code Review

on:
  pull_request:
    types: [opened, ready_for_review]
    # Only runs when PR is first opened or marked ready — not on every push
    # This saves credits significantly

jobs:
  claude-review:
    # Only run if PR has the 'claude-review' label OR is opened by a non-owner
    # Remove the if condition below to run on ALL PRs (costs more)
    if: contains(github.event.pull_request.labels.*.name, 'claude-review')

    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            Please review this pull request. Focus on:
            - Bugs or logic errors
            - Security issues
            - Code quality and best practices
            Keep feedback concise and actionable.
